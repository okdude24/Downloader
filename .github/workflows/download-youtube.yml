name: '🎬 دانلود ویدیو از یوتیوب'

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: '🔗 لینک کامل ویدیو یا Short یوتیوب'
        required: true
        type: string
      format:
        description: '🎞️ فرمت خروجی'
        required: false
        type: choice
        default: 'mp4'
        options:
          - mp4
          - webm
          - mkv
          - mp3 (فقط صوت)
      quality:
        description: '📊 کیفیت (Best = بهترین موجود)'
        required: false
        type: choice
        default: 'best'
        options:
          - best
          - '1080p'
          - '720p'
          - '480p'
          - '360p'
      output_name:
        description: '📁 نام پوشه مقصد (اختیاری)'
        required: false
        type: string
        default: ''
      cookies_secret:
        description: '🍪 نام Secret حاوی کوکی‌ها (اختیاری)'
        required: false
        type: string
        default: ''
      extra_options:
        description: '⚙️ گزینه‌های اضافی yt-dlp (مثلاً --write-thumbnail)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  download-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: 🔄 دریافت کد مخزن
        uses: actions/checkout@v4

      - name: 🐍 نصب Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📥 نصب yt-dlp
        run: pip install yt-dlp

      - name: 🍪 بارگذاری کوکی (در صورت وجود)
        run: |
          COOKIE_SECRET="${{ github.event.inputs.cookies_secret }}"
          if [ -n "$COOKIE_SECRET" ]; then
            echo "${{ secrets[github.event.inputs.cookies_secret] }}" > cookies.txt
            echo "COOKIE_FILE=cookies.txt" >> $GITHUB_ENV
            echo "✅ کوکی‌ها از Secret بارگذاری شدند"
          else
            echo "COOKIE_FILE=" >> $GITHUB_ENV
            echo "⚠️ کوکی تنظیم نشده"
          fi

      - name: 🎯 دانلود ویدیو با yt-dlp
        run: |
          VIDEO_URL="${{ github.event.inputs.video_url }}"
          FORMAT="${{ github.event.inputs.format }}"
          QUALITY="${{ github.event.inputs.quality }}"
          OUTPUT_NAME="${{ github.event.inputs.output_name }}"
          COOKIE_FILE="${{ env.COOKIE_FILE }}"
          EXTRA="${{ github.event.inputs.extra_options }}"

          # ساخت نام پوشه
          if [ -z "$OUTPUT_NAME" ]; then
            FOLDER_NAME="youtube-$(date +%Y%m%d-%H%M%S)"
          else
            FOLDER_NAME="$OUTPUT_NAME"
          fi
          echo "FOLDER_NAME=$FOLDER_NAME" >> $GITHUB_ENV
          mkdir -p "videos/$FOLDER_NAME"

          # تعیین فرمت خروجی
          if [ "$FORMAT" = "mp3 (فقط صوت)" ]; then
            FORMAT_FLAG="mp3"
            AUDIO_FLAG="-x --audio-format mp3"
            EXT="mp3"
          else
            FORMAT_FLAG="$FORMAT"
            AUDIO_FLAG=""
            EXT="$FORMAT"
          fi

          # انتخاب فرمت کیفیت
          case "$QUALITY" in
            best)
              FORMAT_SELECTOR="bestvideo*+bestaudio/best"
              ;;
            1080p)
              FORMAT_SELECTOR="bestvideo[height<=1080]+bestaudio/best[height<=1080]"
              ;;
            720p)
              FORMAT_SELECTOR="bestvideo[height<=720]+bestaudio/best[height<=720]"
              ;;
            480p)
              FORMAT_SELECTOR="bestvideo[height<=480]+bestaudio/best[height<=480]"
              ;;
            360p)
              FORMAT_SELECTOR="bestvideo[height<=360]+bestaudio/best[height<=360]"
              ;;
          esac

          # دانلود
          COOKIE_ARG=""
          if [ -n "$COOKIE_FILE" ]; then
            COOKIE_ARG="--cookies $COOKIE_FILE"
          fi

          echo "📺 شروع دانلود: $VIDEO_URL"
          yt-dlp \
            -f "$FORMAT_SELECTOR" \
            $AUDIO_FLAG \
            -o "videos/$FOLDER_NAME/video.%(ext)s" \
            --merge-output-format "$FORMAT_FLAG" \
            $COOKIE_ARG \
            $EXTRA \
            "$VIDEO_URL"

          # در صورت دانلود فقط صوت، پسوند تغییر می‌کند
          if [ "$FORMAT" = "mp3 (فقط صوت)" ]; then
            if [ -f "videos/$FOLDER_NAME/video.mp3" ]; then
              echo "🎵 فایل صوتی با موفقیت ذخیره شد"
            else
              echo "⚠️ فایل صوتی یافت نشد"
            fi
          else
            echo "🎬 ویدیو در پوشه videos/$FOLDER_NAME ذخیره شد"
          fi

      - name: 🧹 پاکسازی فایل‌های موقت
        run: |
          rm -f cookies.txt

      - name: 📝 کامیت و پوش به مخزن
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos/
          git commit -m "🎬 Add YouTube video from ${{ github.event.inputs.video_url }} → videos/${{ env.FOLDER_NAME }}" || echo "Nothing to commit"
          git push

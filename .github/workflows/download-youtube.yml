name: '📸 اسکرین‌شات از وب‌سایت و ذخیره در مخزن'

on:
  workflow_dispatch:
    inputs:
      website_url:
        description: '🌐 آدرس کامل وب‌سایت (با http:// یا https://)'
        required: true
        type: string
      viewport_width:
        description: '📏 عرض صفحه (پیکسل)'
        required: false
        type: string
        default: '1280'
      viewport_height:
        description: '📐 ارتفاع صفحه (پیکسل)'
        required: false
        type: string
        default: '800'
      full_page:
        description: '🗂️ اسکرین‌شات تمام‌صفحه'
        required: false
        type: boolean
        default: true
      format:
        description: '🖼️ فرمت تصویر خروجی'
        required: false
        type: choice
        default: 'png'
        options:
          - png
          - jpeg
          - webp
      quality:
        description: '🎚️ کیفیت تصویر (فقط برای jpeg و webp، عدد بین ۱ تا ۱۰۰)'
        required: false
        type: string
        default: '90'
      delay:
        description: '⏳ تاخیر قبل از اسکرین‌شات (ثانیه)'
        required: false
        type: string
        default: '2'
      output_name:
        description: '📁 نام پوشه/فایل (اختیاری، در غیر این صورت از دامنه استفاده می‌شود)'
        required: false
        type: string
        default: ''
      cookies_secret:
        description: '🍪 نام Secret حاوی کوکی‌ها (اختیاری، مثلاً COOKIES_JSON)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  screenshot-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: 🔄 دریافت کد مخزن
        uses: actions/checkout@v4

      - name: ⚙️ نصب Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🎭 نصب Playwright و مرورگر Chromium
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: 🍪 بارگذاری کوکی (در صورت وجود)
        run: |
          COOKIE_SECRET="${{ github.event.inputs.cookies_secret }}"
          if [ -n "$COOKIE_SECRET" ]; then
            echo "${{ secrets[github.event.inputs.cookies_secret] }}" > cookies.json
            echo "COOKIE_FILE=cookies.json" >> $GITHUB_ENV
            echo "✅ کوکی‌ها از Secret بارگذاری شدند"
          else
            echo "COOKIE_FILE=" >> $GITHUB_ENV
            echo "⚠️ کوکی تنظیم نشده — در صورت نیاز به لاگین ممکن است اسکرین‌شات درست نباشد"
          fi

      - name: 📥 گرفتن اسکرین‌شات با Playwright
        id: screenshot
        run: |
          WEBSITE_URL="${{ github.event.inputs.website_url }}"
          FORMAT="${{ github.event.inputs.format }}"
          QUALITY="${{ github.event.inputs.quality }}"
          DELAY="${{ github.event.inputs.delay }}"
          WIDTH="${{ github.event.inputs.viewport_width }}"
          HEIGHT="${{ github.event.inputs.viewport_height }}"
          FULL_PAGE="${{ github.event.inputs.full_page }}"
          OUTPUT_NAME="${{ github.event.inputs.output_name }}"

          # ساخت نام پوشه از دامنه یا نام دلخواه
          if [ -z "$OUTPUT_NAME" ]; then
            DOMAIN=$(echo "$WEBSITE_URL" | awk -F/ '{print $3}' | sed 's/[^a-zA-Z0-9._-]/_/g')
            FOLDER_NAME="$DOMAIN-$(date +%Y%m%d-%H%M%S)"
          else
            FOLDER_NAME="$OUTPUT_NAME"
          fi

          echo "FOLDER_NAME=$FOLDER_NAME" >> $GITHUB_ENV
          echo "📌 پوشه مقصد: screenshots/$FOLDER_NAME"

          mkdir -p "screenshots/$FOLDER_NAME"

          # ذخیرهٔ کوکی‌ها در صورت وجود
          if [ -n "${{ env.COOKIE_FILE }}" ]; then
            COOKIE_PARAM="--cookies-file=${{ env.COOKIE_FILE }}"
          else
            COOKIE_PARAM=""
          fi

          # اجرای اسکریپت Node.js
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const context = await browser.newContext({
              viewport: { width: parseInt('$WIDTH'), height: parseInt('$HEIGHT') }
            });
            const page = await context.newPage();

            // بارگذاری کوکی‌ها در صورت وجود فایل
            if ('$COOKIE_FILE') {
              const fs = require('fs');
              if (fs.existsSync('$COOKIE_FILE')) {
                const cookies = JSON.parse(fs.readFileSync('$COOKIE_FILE', 'utf-8'));
                await context.addCookies(cookies);
                console.log('🍪 کوکی‌ها بارگذاری شدند');
              }
            }

            await page.goto('$WEBSITE_URL', { waitUntil: 'networkidle' });
            await page.waitForTimeout(parseInt('$DELAY') * 1000);
            const screenshotOptions = {
              path: 'screenshots/$FOLDER_NAME/screenshot.$FORMAT',
              type: '$FORMAT',
              fullPage: '$FULL_PAGE' === 'true'
            };
            if ('$FORMAT' === 'jpeg' || '$FORMAT' === 'webp') {
              screenshotOptions.quality = parseInt('$QUALITY');
            }
            await page.screenshot(screenshotOptions);
            console.log('✅ اسکرین‌شات ذخیره شد');
            await browser.close();
          })();
          "

      - name: 🧹 پاکسازی فایل‌های موقت
        run: |
          rm -f cookies.json package.json package-lock.json
          rm -rf node_modules

      - name: 📝 کامیت و پوش به مخزن
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/
          git commit -m "📸 Add screenshot of $WEBSITE_URL → screenshots/$FOLDER_NAME" || echo "Nothing to commit"
          git push
